{{- if .Values.bluegreen.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-api.fullname" . }}-preview
  labels:
    app: {{ include "task-api.name" . }}-preview
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "task-api.name" . }}-preview
  template:
    metadata:
      labels:
        app: {{ include "task-api.name" . }}-preview
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.bluegreen.previewTag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "{{ .Values.config.DB_HOST }}"
        - name: DB_PORT
          value: "{{ .Values.config.DB_PORT }}"
        - name: DB_NAME
          value: "{{ .Values.config.DB_NAME }}"
        - name: DB_USER
          value: "{{ .Values.config.DB_USER }}"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "task-api.fullname" . }}-secret
              key: DB_PASSWORD
        - name: PORT
          value: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.bluegreen.activeService }}
spec:
  selector:
    app: {{ include "task-api.name" . }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.bluegreen.previewService }}
spec:
  selector:
    app: {{ include "task-api.name" . }}-preview
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8000
{{- end }}
