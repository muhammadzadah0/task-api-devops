apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-api.fullname" . }}
  labels:
    app: {{ include "task-api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ include "task-api.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "task-api.name" . }}
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "{{ .Values.config.DB_HOST }}"
        - name: DB_PORT
          value: "{{ .Values.config.DB_PORT }}"
        - name: DB_NAME
          value: "{{ .Values.config.DB_NAME }}"
        - name: DB_USER
          value: "{{ .Values.config.DB_USER }}"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "task-api.fullname" . }}-secret
              key: DB_PASSWORD
        - name: PORT
          value: "8000"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-api.fullname" . }}
spec:
  selector:
    app: {{ include "task-api.name" . }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8000
  type: {{ .Values.service.type }}
